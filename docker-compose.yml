version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: atlas_user
      POSTGRES_PASSWORD: atlas_pass
      POSTGRES_DB: atlas_bank
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      POSTGRES_USER: atlas_user
      POSTGRES_PASSWORD: atlas_pass
      POSTGRES_DB: atlas_bank
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      - db
    volumes:
      - ./data:/app/data

volumes:
  postgres_data:
